<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Validador de Devoluciones</title>

  <style>
    body {
      font-family: 'Inter', Arial, sans-serif;
      background-image: url("https://rappi-cargo-br.s3.amazonaws.com/ar/vivo-images/app/refer-H1NQwU8tZe-M.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    #topbar {
      width: 100%;
      max-width: 480px;
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    #blogBtn {
      background: #ff6b00;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
      transition: 0.2s;
    }

    #blogBtn:hover {
      background: #e65f00;
    }

    #container {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.85);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    h2 {
      margin-top: 0;
      text-align: center;
      color: #2d3a8c;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      margin-top: 12px;
      width: 100%;
      padding: 12px;
      background: #4a6cff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #3a57d6;
    }

    #card {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      background: #f7f9ff;
      border: 1px solid #dce3ff;
    }

    #footer {
      margin-top: 40px;
      text-align: center;
      font-size: 14px;
      color: #ffffff;
      opacity: 0.85;
    }
  </style>
</head>

<body>

<div id="topbar">
  <a id="blogBtn" href="https://soyrappi.com.ar/blog" target="_blank">Blog Soy Rappi</a>
</div>

<div id="container">
  <h2>Validación de Devoluciones</h2>

  <input id="orden" type="text" placeholder="Número de orden">
  <button onclick="buscar()">Validar</button>

  <div id="card"></div>
</div>

<div id="footer">
  Owner del sitio: <b>Rodrigo Pastrana</b> — Turbo Buenos Aires Interior
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxU5SZQSfDs1IkG4VIDs-PcP5eyp9RvqtzDsRbjad6vtnHv_3XNNTfRJNWkDNkM6c94/exec";

function buscar() {
  const orden = document.getElementById("orden").value;
  if (!orden) {
    document.getElementById("card").innerHTML = "<span style='color:red;'>Ingresá un número de orden.</span>";
    return;
  }

  fetch(API_URL + "?orden=" + orden)
    .then(r => r.json())
    .then(res => {
      if (res.status === "not_found") {
        document.getElementById("card").innerHTML = "<span style='color:red;'>❌ No se encontró la devolución.</span>";
      } else if (res.status === "ok") {
        const d = res.data;
        document.getElementById("card").innerHTML = `
          <div>
            <strong style="color:green;">✔ Devolución registrada</strong><br><br>

            <b>Fecha:</b> ${d.fecha}<br>
            <b>Pick Up:</b> ${d.pickup}<br>
            <b>Mail RT:</b> ${d.mail}<br>
            <b>ID RT:</b> ${d.idrt}<br>
            <b>Tipo:</b> ${d.tipo}<br>
            <b>Cantidad:</b> ${d.cantidad}<br>
          </div>
        `;
      }
    })
    .catch(err => {
      document.getElementById("card").innerHTML = "<span style='color:red;'>Error de conexión.</span>";
    });
}
</script>

</body>
</html>
